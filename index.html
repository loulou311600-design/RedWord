<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedWord</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1 class="logo">RedWord</h1>

    <p class="subtitle">
        Crossword Game
        <br>
        لعبة الكلمات المتقاطعة
   <div class="language-box">
    <button id="englishBtn" class="lang-btn">🇬🇧 English</button>
    <button id="arabicBtn" class="lang-btn">🇸🇦 العربية</button>
</div>

    

   <button id="startBtn" class="play-btn">
    Start Game
</button>

<div id="gameArea" style="display:none;">

    <h2>Score : <span id="score">0</span></h2>

    <h3 id="hint">
    Hint will appear here
</h3>

<div id="grid"></div>

<input
    type="text"
    id="answerInput"
    placeholder="Type your answer"
>

<button id="checkBtn" class="play-btn">
    Check
</button>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
